<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAKOM TOOLS - Gaming Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #000; overflow: hidden; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .face { position: absolute; width: 100%; height: 100%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: #f97316; border-radius: 0.5rem; box-shadow: inset 0 0 15px rgba(249,115,22,0.2); backface-visibility: hidden; }
        .tab-active { color: #f97316; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .hidden-screen { display: none !important; }
        .animate-impact { animation: impact 0.2s ease-out; }
        @keyframes impact { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="text-gray-200 select-none touch-none h-screen flex items-center justify-center">

    <div id="app-container" class="w-full max-w-md h-screen relative overflow-hidden bg-[#070707] shadow-2xl border-x border-white/5">
        
        <!-- HOME SCREEN -->
        <div id="screen-home" class="flex flex-col h-full animate-in fade-in duration-700 bg-[#070707]">
            <header class="p-8 pb-4 flex flex-col items-center">
                <div class="w-10 h-1 bg-orange-500 mb-6 rounded-full shadow-[0_0_15px_#f97316]"></div>
                <h1 class="text-3xl font-black tracking-tighter italic text-white leading-none uppercase">Makom <span class="text-orange-500">Tools</span></h1>
                <p class="text-[9px] uppercase tracking-[0.5em] text-gray-700 mt-2 font-bold italic">Gaming Ecosystem</p>
            </header>
            <main class="flex-1 p-6 space-y-4">
                <button onclick="navigate('arenak')" class="w-full text-left p-6 rounded-[2rem] border bg-[#121212] border-white/5 hover:border-orange-500/40 active:scale-95 transition-all shadow-xl group flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black italic tracking-tighter uppercase text-white group-hover:text-orange-500 transition-colors">ARENAK</h3>
                        <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Reloj de Arena Pro</p>
                    </div>
                    <div class="p-3 rounded-2xl bg-white/5 text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                </button>
                <button onclick="navigate('dice')" class="w-full text-left p-6 rounded-[2rem] border bg-[#121212] border-white/5 hover:border-orange-500/40 active:scale-95 transition-all shadow-xl group flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black italic tracking-tighter uppercase text-white group-hover:text-orange-500 transition-colors">DADOS 3D</h3>
                        <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Física Digital</p>
                    </div>
                    <div class="p-3 rounded-2xl bg-white/5 text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M7 7h.01"/><path d="M17 7h.01"/><path d="M7 17h.01"/><path d="M17 17h.01"/><path d="M12 12h.01"/></svg></div>
                </button>
                <button onclick="navigate('puntos')" class="w-full text-left p-6 rounded-[2rem] border bg-[#121212] border-white/5 hover:border-orange-500/40 active:scale-95 transition-all shadow-xl group flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-black italic tracking-tighter uppercase text-white group-hover:text-orange-500 transition-colors">PUNTOS</h3>
                        <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Scorekeeper Rápido</p>
                    </div>
                    <div class="p-3 rounded-2xl bg-white/5 text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></div>
                </button>
            </main>
            <footer class="p-6 text-center text-[7px] text-gray-800 uppercase tracking-widest font-medium italic">BUILD 2026.02 — MAKOM LABS</footer>
        </div>

        <!-- ARENAK SCREEN -->
        <div id="screen-arenak" class="hidden-screen flex flex-col h-full bg-[#080808]">
            <header class="flex justify-between items-center p-6">
                <button onclick="navigate('home')" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                <div class="text-center">
                    <h2 class="text-xl font-black italic tracking-tighter uppercase text-white"><span class="text-orange-500">A</span>renak</h2>
                    <p class="text-[8px] uppercase tracking-[0.3em] text-gray-600 font-bold">Motor Atmosférico</p>
                </div>
                <button id="arenak-sound-btn" onclick="toggleArenakSound()" class="p-3 rounded-2xl bg-white/5 text-orange-500">
                    <svg id="arenak-vol-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
            </header>
            <main class="flex-1 flex flex-col items-center justify-around px-6 pb-8 relative overflow-hidden">
                <div id="arenak-glass" class="relative w-40 h-56 transition-transform duration-1000 cursor-pointer" onclick="toggleTimer()">
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="w-32 h-24 bg-white/5 rounded-t-[60px] rounded-b-[20px] relative overflow-hidden border-t border-x border-white/10 shadow-inner">
                            <div id="sand-top" class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-orange-600 to-orange-400 transition-all duration-300 h-full"></div>
                        </div>
                        <div class="w-5 h-2 bg-black relative z-20">
                            <div id="sand-fall" class="hidden absolute left-1/2 -translate-x-1/2 w-[1px] bg-orange-400 h-20 top-0 shadow-[0_0_8px_#fb923c]"></div>
                        </div>
                        <div class="w-32 h-24 bg-white/5 rounded-b-[60px] rounded-t-[20px] relative overflow-hidden border-b border-x border-white/10 shadow-inner">
                            <div id="sand-bottom" class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-orange-700 to-orange-500 transition-all duration-300 h-0"></div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="flex items-center gap-6">
                        <button onclick="adjustTime(-30)" class="p-3 bg-white/5 rounded-full text-gray-600 active:text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg></button>
                        <div onclick="openArenakEdit()" class="group relative cursor-pointer">
                            <div id="arenak-display" class="text-6xl font-black font-mono text-white tracking-tighter tabular-nums group-hover:text-orange-500">01:00</div>
                        </div>
                        <button onclick="adjustTime(30)" class="p-3 bg-white/5 rounded-full text-gray-600 active:text-orange-500"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
                    </div>
                </div>
                <div class="w-full max-w-sm grid grid-cols-3 gap-3">
                    <button onclick="resetTimer()" class="py-4 bg-white/5 rounded-[1.5rem] text-gray-500 flex flex-col items-center"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg><span class="text-[7px] mt-1.5 font-black uppercase tracking-widest">Reiniciar</span></button>
                    <button id="arenak-play-btn" onclick="toggleTimer()" class="py-4 rounded-[1.5rem] bg-orange-500 text-white flex flex-col items-center shadow-lg"><svg id="arenak-play-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="m7 4 12 8-12 8V4z"/></svg><span id="arenak-play-text" class="text-[7px] mt-1.5 font-black uppercase tracking-widest">Fluir</span></button>
                    <button onclick="flipTimer()" class="py-4 bg-white/5 rounded-[1.5rem] text-gray-500 flex flex-col items-center"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="m21 16-3 3-3-3"/><path d="M11 19h10"/></svg><span class="text-[7px] mt-1.5 font-black uppercase tracking-widest">Girar</span></button>
                </div>
            </main>
            <!-- Edit Modal -->
            <div id="arenak-modal" class="hidden absolute inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
                <div class="w-full bg-[#121212] rounded-[2.5rem] border border-white/10 p-8 shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-sm font-black text-orange-500 tracking-widest uppercase italic">Ajuste Manual</h3>
                        <button onclick="closeArenakEdit()" class="p-2 text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                    </div>
                    <div class="grid grid-cols-3 gap-4 mb-10">
                        <div class="flex flex-col items-center gap-2">
                            <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Horas</label>
                            <input id="edit-h" type="number" value="0" min="0" class="w-full bg-white/5 rounded-2xl py-4 text-3xl font-black text-white text-center border border-white/5 outline-none">
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Minutos</label>
                            <input id="edit-m" type="number" value="1" min="0" max="59" class="w-full bg-white/5 rounded-2xl py-4 text-3xl font-black text-white text-center border border-white/5 outline-none">
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Segundos</label>
                            <input id="edit-s" type="number" value="0" min="0" max="59" class="w-full bg-white/5 rounded-2xl py-4 text-3xl font-black text-white text-center border border-white/5 outline-none">
                        </div>
                    </div>
                    <button onclick="saveArenakEdit()" class="w-full py-5 bg-orange-500 text-white font-black text-lg rounded-[2rem] uppercase tracking-widest">Confirmar</button>
                </div>
            </div>
        </div>

        <!-- DICE SCREEN -->
        <div id="screen-dice" class="hidden-screen flex flex-col h-full bg-[#080808]">
            <header class="flex justify-between items-center p-6">
                <button onclick="navigate('home')" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                <div class="text-center">
                    <h2 class="text-xl font-black italic tracking-tighter text-white uppercase">Dados <span class="text-orange-500">3D</span></h2>
                    <p class="text-[8px] uppercase tracking-[0.3em] text-gray-600 font-bold">Física y Audio Digital</p>
                </div>
                <button id="dice-sound-btn" onclick="toggleDiceSound()" class="p-3 rounded-2xl bg-white/5 text-orange-500">
                    <svg id="dice-vol-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
            </header>
            <main class="flex-1 flex flex-col items-center justify-between px-6 pb-8">
                <div id="dice-container" class="relative w-full aspect-square bg-gradient-to-b from-[#111] to-[#050505] rounded-[2.5rem] border border-white/5 shadow-2xl flex flex-wrap items-center justify-center gap-6 p-8 overflow-hidden">
                    <!-- Los dados se inyectan aquí -->
                    <div class="opacity-10"><svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="0.5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M7 7h.01"/><path d="M17 7h.01"/><path d="M7 17h.01"/><path d="M17 17h.01"/><path d="M12 12h.01"/></svg></div>
                </div>
                <div class="w-full space-y-4">
                    <div class="flex justify-between items-center bg-white/5 p-1.5 rounded-[1.5rem] border border-white/5">
                        <button onclick="updateDiceCount(-1)" class="p-3 text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg></button>
                        <div class="text-center"><div id="dice-count-display" class="text-xl font-black text-white">1</div><div class="text-[7px] uppercase font-bold text-gray-600 tracking-widest">Dados</div></div>
                        <button onclick="updateDiceCount(1)" class="p-3 text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
                    </div>
                    <button onclick="rollDice()" id="roll-btn" class="w-full py-5 rounded-[2rem] bg-orange-500 text-white font-black text-lg tracking-[0.1em] shadow-xl uppercase">Lanzar Dados</button>
                </div>
            </main>
        </div>

        <!-- PUNTOS SCREEN -->
        <div id="screen-puntos" class="hidden-screen flex flex-col h-full bg-[#080808]">
             <!-- El contenido de puntos se maneja dinámicamente -->
        </div>

    </div>

    <script>
        // --- ESTADO GLOBAL ---
        let currentScreen = 'home';
        
        // --- ARENAK LOGIC ---
        let arenak = {
            total: 60,
            left: 60,
            active: false,
            flipped: false,
            sound: true,
            interval: null
        };

        // --- DICE LOGIC ---
        let dice = {
            count: 1,
            rolling: false,
            sound: true
        };

        // --- PUNTOS LOGIC ---
        let points = {
            view: 'setup', // setup, active, podio, history
            gameName: '',
            players: [
                { id: 1, name: 'Jugador 1', score: 0, color: '#f97316' },
                { id: 2, name: 'Jugador 2', score: 0, color: '#3b82f6' }
            ],
            history: JSON.parse(localStorage.getItem('makom_history') || '[]')
        };

        const COLORS = ["#f97316", "#3b82f6", "#a855f7", "#22c55e", "#ef4444", "#eab308"];

        // --- AUDIO ENGINE ---
        const AudioEngine = {
            ctx: null,
            gain: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playClick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(150 + Math.random() * 300, this.ctx.currentTime);
                g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                osc.connect(g);
                g.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            },
            playImpact() {
                this.init();
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
                g.gain.setValueAtTime(0.3, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
                osc.connect(g);
                g.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            }
        };

        // --- NAVIGATION ---
        function navigate(screen) {
            document.querySelectorAll('#app-container > div').forEach(div => div.classList.add('hidden-screen'));
            document.getElementById(`screen-${screen}`).classList.remove('hidden-screen');
            currentScreen = screen;
            if(screen === 'puntos') renderPuntos();
        }

        // --- TIMER ENGINE ---
        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            return h > 0 ? 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : 
                `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateTimerUI() {
            document.getElementById('arenak-display').innerText = formatTime(arenak.left);
            const percent = (arenak.left / arenak.total) * 100;
            document.getElementById('sand-top').style.height = `${percent}%`;
            document.getElementById('sand-bottom').style.height = `${100 - percent}%`;
            
            const playIcon = document.getElementById('arenak-play-icon');
            const playText = document.getElementById('arenak-play-text');
            const sandFall = document.getElementById('sand-fall');

            if (arenak.active && arenak.left > 0) {
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                playText.innerText = 'Pausa';
                sandFall.classList.remove('hidden');
            } else {
                playIcon.innerHTML = '<path d="m7 4 12 8-12 8V4z"/>';
                playText.innerText = 'Fluir';
                sandFall.classList.add('hidden');
            }
        }

        function toggleTimer() {
            arenak.active = !arenak.active;
            if (arenak.active) {
                AudioEngine.init();
                arenak.interval = setInterval(() => {
                    arenak.left = Math.max(0, arenak.left - 0.1);
                    if (arenak.left <= 0) {
                        arenak.active = false;
                        clearInterval(arenak.interval);
                    }
                    updateTimerUI();
                }, 100);
            } else {
                clearInterval(arenak.interval);
            }
            updateTimerUI();
        }

        function resetTimer() {
            arenak.active = false;
            clearInterval(arenak.interval);
            arenak.left = arenak.total;
            updateTimerUI();
        }

        function flipTimer() {
            arenak.flipped = !arenak.flipped;
            document.getElementById('arenak-glass').style.transform = arenak.flipped ? 'rotate(180deg)' : 'rotate(0deg)';
            resetTimer();
            toggleTimer();
        }

        function adjustTime(amt) {
            arenak.total = Math.max(5, arenak.total + amt);
            arenak.left = arenak.total;
            updateTimerUI();
        }

        function openArenakEdit() {
            document.getElementById('arenak-modal').classList.remove('hidden');
            document.getElementById('edit-h').value = Math.floor(arenak.total / 3600);
            document.getElementById('edit-m').value = Math.floor((arenak.total % 3600) / 60);
            document.getElementById('edit-s').value = Math.floor(arenak.total % 60);
        }

        function closeArenakEdit() { document.getElementById('arenak-modal').classList.add('hidden'); }

        function saveArenakEdit() {
            const h = parseInt(document.getElementById('edit-h').value) || 0;
            const m = parseInt(document.getElementById('edit-m').value) || 0;
            const s = parseInt(document.getElementById('edit-s').value) || 0;
            arenak.total = (h * 3600) + (m * 60) + s;
            arenak.left = arenak.total;
            updateTimerUI();
            closeArenakEdit();
        }

        function toggleArenakSound() {
            arenak.sound = !arenak.sound;
            document.getElementById('arenak-sound-btn').className = arenak.sound ? 'p-3 rounded-2xl bg-white/5 text-orange-500' : 'p-3 rounded-2xl bg-white/5 text-gray-600';
        }

        // --- DICE ENGINE ---
        function updateDiceCount(amt) {
            dice.count = Math.min(6, Math.max(1, dice.count + amt));
            document.getElementById('dice-count-display').innerText = dice.count;
        }

        function createDiceHTML(val) {
            const rotations = {
                1: 'rotateX(0deg) rotateY(0deg)',
                2: 'rotateX(0deg) rotateY(180deg)',
                3: 'rotateX(0deg) rotateY(-90deg)',
                4: 'rotateX(0deg) rotateY(90deg)',
                5: 'rotateX(-90deg) rotateY(0deg)',
                6: 'rotateX(90deg) rotateY(0deg)'
            };
            return `
                <div class="perspective-1000 w-16 h-16">
                    <div class="preserve-3d w-full h-full relative transition-transform duration-700 ease-out die-cube" style="transform: ${rotations[val]}">
                        <div class="face" style="transform: rotateY(0deg) translateZ(32px)">${val}</div>
                        <div class="face" style="transform: rotateY(180deg) translateZ(32px)">2</div>
                        <div class="face" style="transform: rotateY(90deg) translateZ(32px)">3</div>
                        <div class="face" style="transform: rotateY(-90deg) translateZ(32px)">4</div>
                        <div class="face" style="transform: rotateX(90deg) translateZ(32px)">5</div>
                        <div class="face" style="transform: rotateX(-90deg) translateZ(32px)">6</div>
                    </div>
                </div>
            `;
        }

        function rollDice() {
            if (dice.rolling) return;
            dice.rolling = true;
            const container = document.getElementById('dice-container');
            const btn = document.getElementById('roll-btn');
            btn.innerText = 'Agitando...';
            btn.classList.add('opacity-50');

            // Efecto de agitación rápida
            let interval = setInterval(() => {
                if(dice.sound) AudioEngine.playClick();
                container.innerHTML = Array(dice.count).fill(0).map(() => createDiceHTML(Math.floor(Math.random()*6)+1)).join('');
                document.querySelectorAll('.die-cube').forEach(d => {
                    d.style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
                });
            }, 100);

            setTimeout(() => {
                clearInterval(interval);
                const finalValues = Array.from({length: dice.count}, () => Math.floor(Math.random()*6)+1);
                const total = finalValues.reduce((a,b) => a+b, 0);
                container.innerHTML = finalValues.map(v => createDiceHTML(v)).join('');
                container.innerHTML += `
                    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center animate-in fade-in slide-in-from-bottom-2">
                        <span class="text-[10px] text-gray-600 font-black uppercase tracking-[0.2em] mb-1">Total</span>
                        <div class="text-4xl font-black text-white italic drop-shadow-[0_0_15px_rgba(249,115,22,0.4)]">${total}</div>
                    </div>
                `;
                if(dice.sound) AudioEngine.playImpact();
                dice.rolling = false;
                btn.innerText = 'Lanzar Dados';
                btn.classList.remove('opacity-50');
                container.classList.add('animate-impact');
                setTimeout(() => container.classList.remove('animate-impact'), 200);
            }, 1000);
        }

        function toggleDiceSound() {
            dice.sound = !dice.sound;
            document.getElementById('dice-sound-btn').className = dice.sound ? 'p-3 rounded-2xl bg-white/5 text-orange-500' : 'p-3 rounded-2xl bg-white/5 text-gray-600';
        }

        // --- PUNTOS ENGINE (RENDER DINÁMICO) ---
        function renderPuntos() {
            const container = document.getElementById('screen-puntos');
            let html = '';

            if (points.view === 'setup') {
                html = `
                    <header class="flex justify-between items-center p-6">
                        <button onclick="navigate('home')" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                        <div class="text-center">
                            <h2 class="text-xl font-black italic tracking-tighter text-white uppercase"><span class="text-orange-500">P</span>untos</h2>
                            <p class="text-[8px] uppercase tracking-[0.3em] text-gray-600 font-bold">Módulo Scorekeeper</p>
                        </div>
                        <button onclick="points.view='history'; renderPuntos()" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                    </header>
                    <main class="flex-1 flex flex-col p-6 overflow-hidden">
                        <div class="mb-6">
                            <input id="game-name-input" oninput="points.gameName=this.value" placeholder="NOMBRE DEL JUEGO..." value="${points.gameName}" class="w-full bg-transparent border-b border-white/10 py-3 text-xl font-black italic text-white placeholder:text-gray-800 focus:border-orange-500 outline-none uppercase" />
                        </div>
                        <div class="flex-1 space-y-2 overflow-y-auto mb-6 pr-1">
                            <p class="text-[9px] font-black uppercase tracking-widest text-gray-600 mb-2">Jugadores (${points.players.length}/6)</p>
                            ${points.players.map(p => `
                                <div class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/5">
                                    <div class="w-10 h-10 rounded-xl flex-shrink-0" style="background-color: ${p.color}"></div>
                                    <input onchange="updatePlayerName(${p.id}, this.value)" value="${p.name}" class="flex-1 bg-transparent font-bold text-white outline-none text-sm" />
                                    <button onclick="removePlayer(${p.id})" class="p-3 text-gray-700 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
                                </div>
                            `).join('')}
                            ${points.players.length < 6 ? `
                                <button onclick="addPlayer()" class="w-full py-4 border border-dashed border-white/10 rounded-2xl flex items-center justify-center gap-2 text-gray-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
                                    <span class="font-black uppercase text-[9px] tracking-widest">Añadir Jugador</span>
                                </button>
                            ` : ''}
                        </div>
                        <button onclick="points.view='active'; renderPuntos()" class="w-full py-5 rounded-[2rem] bg-orange-500 text-white font-black text-lg shadow-xl uppercase">COMENZAR PARTIDA</button>
                    </main>
                `;
            } else if (points.view === 'active') {
                html = `
                    <header class="flex justify-between items-center p-6">
                        <button onclick="points.view='setup'; renderPuntos()" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                        <div class="text-center">
                            <h2 class="text-xl font-black italic tracking-tighter text-white uppercase">${points.gameName || 'PARTIDA'}</h2>
                        </div>
                        <div class="w-10"></div>
                    </header>
                    <main class="flex-1 flex flex-col p-4 gap-3 overflow-y-auto pb-28">
                        ${points.players.map(p => `
                            <div class="bg-[#121212] rounded-[1.5rem] border border-white/5 p-4 flex items-center justify-between">
                                <div class="flex-1 overflow-hidden">
                                    <div class="flex items-center gap-2 mb-1">
                                        <div class="w-2 h-2 rounded-full" style="background-color: ${p.color}"></div>
                                        <h3 class="text-[10px] font-black uppercase text-gray-500 truncate">${p.name}</h3>
                                    </div>
                                    <div class="text-4xl font-black italic text-white tabular-nums">${p.score}</div>
                                </div>
                                <div class="grid grid-cols-2 gap-1.5 scale-90">
                                    <button onclick="updateScore(${p.id}, -5)" class="w-10 h-10 rounded-xl bg-white/5 text-[9px] font-black text-gray-600">-5</button>
                                    <button onclick="updateScore(${p.id}, 5)" class="w-10 h-10 rounded-xl bg-orange-500/10 text-[9px] font-black text-orange-500">+5</button>
                                    <button onclick="updateScore(${p.id}, -1)" class="w-10 h-10 rounded-xl bg-white/5 text-gray-400">-</button>
                                    <button onclick="updateScore(${p.id}, 1)" class="w-10 h-10 rounded-xl bg-orange-500 text-white shadow-lg">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </main>
                    <div class="fixed bottom-6 left-6 right-6 max-w-md mx-auto">
                        <button onclick="finishGame()" class="w-full py-4 bg-white text-black font-black text-lg rounded-[2rem] shadow-2xl uppercase">Finalizar</button>
                    </div>
                `;
            } else if (points.view === 'podio') {
                const sorted = [...points.players].sort((a,b) => b.score - a.score);
                html = `
                    <div class="flex flex-col h-full items-center justify-center p-8 text-center bg-[#080808]">
                        <div class="w-20 h-20 bg-orange-500 rounded-full flex items-center justify-center shadow-lg mb-6"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></div>
                        <h2 class="text-[10px] font-black uppercase tracking-[0.5em] text-orange-500 mb-2">Victoria Magistral</h2>
                        <h1 class="text-4xl font-black text-white italic mb-8 uppercase">${sorted[0].name}</h1>
                        <div class="w-full space-y-2 mb-12">
                            ${sorted.map((p, i) => `
                                <div class="flex justify-between items-center p-4 rounded-2xl border ${i===0?'bg-orange-500/10 border-orange-500/30':'bg-white/5 border-white/5'}">
                                    <span class="font-bold text-white text-sm">#${i+1} ${p.name}</span>
                                    <span class="font-black italic text-sm text-orange-500">${p.score} PTS</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="points.view='setup'; points.players.forEach(p=>p.score=0); renderPuntos()" class="w-full py-5 bg-orange-500 rounded-[2rem] text-white font-black uppercase">GUARDAR Y SALIR</button>
                    </div>
                `;
            } else if (points.view === 'history') {
                 html = `
                    <header class="flex justify-between items-center p-6 border-b border-white/5">
                        <button onclick="points.view='setup'; renderPuntos()" class="p-3 bg-white/5 rounded-2xl text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                        <h2 class="text-xl font-black italic tracking-tighter text-white uppercase">Historial</h2>
                        <div class="w-10"></div>
                    </header>
                    <main class="flex-1 p-6 space-y-3 overflow-y-auto">
                        ${points.history.length === 0 ? '<p class="text-center opacity-20 mt-20 uppercase font-black tracking-widest text-xs">Sin registros</p>' : 
                        points.history.map(entry => `
                            <div class="bg-white/5 p-5 rounded-3xl border border-white/5 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-orange-500 font-black uppercase mb-1">${entry.date}</p>
                                    <h4 class="text-lg font-black text-white italic">${entry.game}</h4>
                                    <p class="text-xs text-gray-500">Ganador: ${entry.winner}</p>
                                </div>
                                <div class="text-2xl font-black text-white italic">${entry.score}</div>
                            </div>
                        `).join('')}
                    </main>
                `;
            }

            container.innerHTML = html;
        }

        function addPlayer() {
            if (points.players.length >= 6) return;
            points.players.push({
                id: Date.now(),
                name: `Jugador ${points.players.length + 1}`,
                score: 0,
                color: COLORS[points.players.length]
            });
            renderPuntos();
        }

        function removePlayer(id) {
            if (points.players.length <= 1) return;
            points.players = points.players.filter(p => p.id !== id);
            renderPuntos();
        }

        function updatePlayerName(id, name) {
            const p = points.players.find(p => p.id === id);
            if (p) p.name = name;
        }

        function updateScore(id, amt) {
            const p = points.players.find(p => p.id === id);
            if (p) p.score += amt;
            renderPuntos();
        }

        function finishGame() {
            const sorted = [...points.players].sort((a,b) => b.score - a.score);
            const entry = {
                id: Date.now(),
                game: points.gameName || 'Partida Rápida',
                date: new Date().toLocaleDateString(),
                winner: sorted[0].name,
                score: sorted[0].score
            };
            points.history.unshift(entry);
            points.history = points.history.slice(0, 10);
            localStorage.setItem('makom_history', JSON.stringify(points.history));
            points.view = 'podio';
            renderPuntos();
        }

        // Inicializar UI
        updateTimerUI();
    </script>
</body>
</html>
